### Create admin
- name: Create admin user
  user:
    name: admin
    shell: /bin/bash
    groups: sudo
    append: yes
    state: present

- name: Allow admin user passwordless sudo
  copy:
    dest: /etc/sudoers.d/admin
    content: "admin ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"

- name: Set up SSH for admin
  authorized_key:
    user: admin
    state: present
    key: "{{ ssh_public_key }}"

### Harden SSH
- name: Configure SSH hardening
  become: true
  ansible.builtin.blockinfile:
    path: "/etc/ssh/sshd_config.d/00-user.conf"
    create: true
    marker: "# {mark} ANSIBLE MANAGED SSH CONFIG"
    block: |
      Port {{ ssh_port }}
      PasswordAuthentication no
      PermitRootLogin no
  register: ssh_config

- name: Restart sshd immediately
  ansible.builtin.service:
    name: ssh
    state: restarted
  when: ssh_config.changed
