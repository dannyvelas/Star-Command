---
- name: Final Activation - Enable Proxmox Node Firewall
  hosts: proxmox
  become: true
  tasks:
    - name: Get current firewall status
      ansible.builtin.command: pvesh get /nodes/{{ proxmox_node_name }}/firewall/options --output-format yaml
      register: pve_fw_get
      changed_when: false

    - name: Flip the master firewall switch
      ansible.builtin.command: pvesh set /nodes/{{ proxmox_node_name }}/firewall/options --enable 1
      when: "'enable: 1' not in pve_fw_get.stdout"
